# Build MacCleaner on macOS and attach .dmg / .zip to a GitHub Release.
#
# Usage:
#   git tag v0.1.0
#   git push origin v0.1.0
#
# Artifacts are uploaded to the Release for that tag (not committed to git).

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate app icon
        run: npm run build:icon

      - name: Build distributables
        run: npm run dist

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist-electron/*.dmg
            dist-electron/*-mac.zip
